<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .player {
        width: 350px;
        background: white;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .cover {
        width: 220px;
        height: 220px;
        margin: auto;
        border-radius: 15px;
        overflow: hidden;
    }

    .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    h2 {
        margin-top: 15px;
        font-size: 22px;
    }

    p {
        color: gray;
        margin: 5px 0 15px;
    }

    input[type="range"] {
        width: 100%;
        margin: 10px 0;
    }

    .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-top: 15px;
    }

    button {
        border: none;
        background: #2a5298;
        color: white;
        padding: 15px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        transition: 0.3s;
    }

    button:hover {
        background: #1e3c72;
    }

    .time {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="player">
    <div class="cover">
        <img src="https://via.placeholder.com/220" alt="Album Cover">
    </div>

    <h2 id="song-title">Sample Song</h2>
    <p id="artist">Unknown Artist</p>

    <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <input type="range" id="progress" value="0">

    <div class="time">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="playPause()" id="play-btn">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>
</div>

<script>
const songs = [
    {
        title: "Sample Song 1",
        artist: "Artist 1",
        src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    },
    {
        title: "Sample Song 2",
        artist: "Artist 2",
        src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
    },
    {
        title: "Sample Song 3",
        artist: "Artist 3",
        src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
    }
];

let currentSong = 0;
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play-btn");
const progress = document.getElementById("progress");
const title = document.getElementById("song-title");
const artist = document.getElementById("artist");
const currentTime = document.getElementById("current-time");
const duration = document.getElementById("duration");

function loadSong(index) {
    audio.src = songs[index].src;
    title.innerText = songs[index].title;
    artist.innerText = songs[index].artist;
}

function playPause() {
    if (audio.paused) {
        audio.play();
        playBtn.innerText = "⏸";
    } else {
        audio.pause();
        playBtn.innerText = "▶";
    }
}

function prevSong() {
    currentSong--;
    if (currentSong < 0) currentSong = songs.length - 1;
    loadSong(currentSong);
    audio.play();
    playBtn.innerText = "⏸";
}

function nextSong() {
    currentSong++;
    if (currentSong >= songs.length) currentSong = 0;
    loadSong(currentSong);
    audio.play();
    playBtn.innerText = "⏸";
}

audio.addEventListener("loadedmetadata", () => {
    progress.max = audio.duration;
    duration.innerText = formatTime(audio.duration);
});

audio.addEventListener("timeupdate", () => {
    progress.value = audio.currentTime;
    currentTime.innerText = formatTime(audio.currentTime);
});

progress.addEventListener("input", () => {
    audio.currentTime = progress.value;
});

audio.addEventListener("ended", nextSong);

function formatTime(time) {
    let mins = Math.floor(time / 60);
    let secs = Math.floor(time % 60);
    if (secs < 10) secs = "0" + secs;
    return mins + ":" + secs;
}

loadSong(currentSong);
</script>

</body>
</html>
